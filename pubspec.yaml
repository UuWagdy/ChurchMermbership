name: abona_flemoon
description: "Church Membership"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  sqflite: ^2.4.2
  sqflite_common_ffi: ^2.3.4+4
  path_provider: ^2.1.5
  path: ^1.9.1
  provider: ^6.1.2
  intl: ^0.20.2
  google_fonts: ^6.2.1
  pdf: ^3.11.3
  printing: ^5.14.2
  file_picker: ^10.3.10
  flutter_localizations:
    sdk: flutter
  image_picker: ^1.2.1
  barcode: ^2.2.9
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  windows:
    generate: true
    image_path: "assets/images/logo.png"
    icon_size: 256

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/fonts/
    - assets/database/

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
